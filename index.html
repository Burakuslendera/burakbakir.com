<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=0.53 ,user-scalable=yes"
    />
    <title>Burak Bakır</title>
    <script src="smoke.js"></script>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="renderSurface"></canvas>
    <div class="centered-div" id="zoomContainer">
      <h1>
        <a class="link-disabled" draggable="false">
          <img
            src="https://readme-typing-svg.herokuapp.com?font=JetBrains+Mono&weight=600&size=35&duration=4000&pause=1000&color=FFFFFF&center=true&vCenter=true&width=435&lines=Hello%2C+Everyone!;+I'm+Burak+%F0%9F%91%8B"
            class="no-drag"
            alt="Typing SVG"
          />
        </a>
      </h1>
      <div class="main-container">
        <div class="navigation-section">
          <a href="#social" class="nav-button active" data-section="social"
            >SOCIAL</a
          >
          <a href="#projects" class="nav-button" data-section="projects"
            >PROJECTS</a
          >
        </div>
    
        <div class="content-section" id="social">
          <div class="social-links">
            <a
              href="https://www.linkedin.com/in/burakuslendera-burak-bakir/"
              target="_blank"
              class="social-btn clickable-link"
            >
              <img src="./img/linkedin.png" alt="LinkedIn" />
            </a>
            <a
              href="https://github.com/burakuslendera"
              target="_blank"
              class="social-btn clickable-link"
            >
              <img src="./img/github.png" alt="GitHub" />
            </a>
            <a
              href="https://leetcode.com/u/Burakuslendera/"
              target="_blank"
              class="social-btn clickable-link"
            >
              <img src="./img/leetcode.png" alt="LeetCode" />
            </a>
            <a
              href="https://open.spotify.com/user/21z5asbnio3i4fn7ophxfahcy"
              target="_blank"
              class="social-btn clickable-link"
            >
              <img src="./img/spotify.png" alt="Spotify" />
            </a>
            <a
              href="https://steamcommunity.com/id/Burakuslendera/"
              target="_blank"
              class="social-btn clickable-link"
            >
              <img src="./img/steam.png" alt="Steam" />
            </a>
            <a
              href="https://www.youtube.com/@Burakuslenderaa"
              target="_blank"
              class="social-btn clickable-link"
            >
              <img src="./img/youtube.png" alt="Youtube" class="youtubeImg" />
            </a>
            <a
              href="https://x.com/Burakuslendera"
              target="_blank"
              class="social-btn clickable-link"
            >
              <img src="./img/x.png" alt="X" />
            </a>
            <a
              href="https://www.instagram.com/burakuslendera/"
              target="_blank"
              class="social-btn clickable-link"
            >
              <img
                src="./img/instagram.png"
                alt="Instagram"
                class="instagramImg"
              />
            </a>
          </div>
        </div>
        <div class="content-section" id="sites" style="display: none"></div>
        <div class="content-section" id="projects" style="display: none">
          <p class="content-text">
            Genellikle açık kaynak yapmam fakat açık kaynak yaptıklarımı
            ekleyecem.
          </p>
        </div>
      </div>
    </div>
    <script src="deviceScale.js"></script>
    <script>
      document.querySelectorAll(".nav-button").forEach(button => {
        button.addEventListener("click", event => {
          event.preventDefault();

          document
            .querySelector(".nav-button.active")
            .classList.remove("active");
          button.classList.add("active");

          document.querySelectorAll(".content-section").forEach(section => {
            section.style.display = "none";
          });

          const sectionId = button.getAttribute("data-section");
          document.getElementById(sectionId).style.display = "block";
        });
      });

      document.querySelectorAll(".link-disabled").forEach(link => {
        link.addEventListener("click", event => {
          event.preventDefault();
          event.stopPropagation();
        });
      });

      const canvas = document.getElementById("renderSurface");

      const smoke = new Smoke(canvas);

      smoke.activate();
    </script>
  </body>
</html>
